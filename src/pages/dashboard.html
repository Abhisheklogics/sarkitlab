<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — SarkitLab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../style.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --nav-h: 58px;
      --accent:       #c4611a;
      --accent-dark:  #a34f13;
      --accent-light: #fff2e8;
      --ink-900: #1a1714;
      --ink-700: #3d3730;
      --ink-500: #6b6259;
      --ink-400: #8c8178;
      --ink-300: #b5aca3;
      --bg:           #f5f2ee;
      --bg-elevated:  #ffffff;
      --border:       #e8e3dc;
      --border-soft:  #ede8e1;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body:    'Plus Jakarta Sans', system-ui, sans-serif;
      --font-mono:    'JetBrains Mono', monospace;
      --r-sm: 6px; --r-md: 10px; --r-lg: 16px; --r-xl: 22px;
      --shadow-xs: 0 1px 3px rgba(0,0,0,.06);
      --shadow-sm: 0 2px 8px rgba(0,0,0,.08);
      --shadow-md: 0 4px 20px rgba(0,0,0,.10);
      --ease: .18s ease;
    }

    body { font-family: var(--font-body); background: var(--bg); color: var(--ink-700); min-height: 100vh; }

    /* NAV */
    .nav {
      height: var(--nav-h);
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 200;
      box-shadow: var(--shadow-xs);
    }
    .nav-inner {
      max-width: 1200px; margin: 0 auto; padding: 0 24px;
      height: 100%; display: flex; align-items: center; gap: 0;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 9px;
      font-family: var(--font-display); font-size: 19px; font-weight: 700;
      color: var(--ink-900); text-decoration: none; letter-spacing: -0.02em; flex-shrink: 0;
    }
    .nav-logo-icon {
      width: 32px; height: 32px; background: var(--accent);
      border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff;
    }
    .nav-logo span { color: var(--accent); }

    .nav-center { flex: 1; display: flex; align-items: center; justify-content: center; }
    .nav-search {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 99px; padding: 7px 16px; width: 280px;
      transition: border-color var(--ease), box-shadow var(--ease);
    }
    .nav-search:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(196,97,26,.1); }
    .nav-search svg { color: var(--ink-300); flex-shrink: 0; }
    .nav-search input {
      border: none; background: transparent; font-family: var(--font-body);
      font-size: 13px; color: var(--ink-900); outline: none; width: 100%;
    }
    .nav-search input::placeholder { color: var(--ink-300); }

    .nav-right { display: flex; align-items: center; gap: 6px; margin-left: auto; }
    .nav-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: var(--r-md);
      font-family: var(--font-body); font-size: 13px; font-weight: 600;
      cursor: pointer; text-decoration: none; border: 1px solid transparent;
      transition: all var(--ease); white-space: nowrap;
    }
    .btn-ghost   { background: transparent; border-color: var(--border); color: var(--ink-700); }
    .btn-ghost:hover { background: var(--bg); }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-danger  { background: transparent; border-color: #fcd5d0; color: #c0392b; }
    .btn-danger:hover { background: #fef2f0; }

    .nav-divider { width: 1px; height: 22px; background: var(--border); margin: 0 4px; }
    .nav-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--accent); color: #fff;
      font-family: var(--font-display); font-weight: 700; font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0; cursor: pointer;
    }
    .nav-avatar img { width: 100%; height: 100%; object-fit: cover; }

    /* PAGE LAYOUT */
    .page {
      max-width: 1200px; margin: 0 auto; padding: 28px 24px;
      display: grid; grid-template-columns: 268px 1fr; gap: 22px; align-items: start;
    }

    /* PROFILE CARD */
    .profile-card {
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: var(--r-xl); overflow: hidden; box-shadow: var(--shadow-sm);
      position: sticky; top: calc(var(--nav-h) + 16px);
    }
    .profile-cover {
      height: 52px;
      background: linear-gradient(120deg, #c4611a 0%, #e07b39 55%, #f5b97a 100%);
    }
    .profile-body { padding: 0 18px 18px; }
    .profile-av-wrap { margin-top: -24px; margin-bottom: 10px; }
    .av-lg {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--accent); color: #fff;
      font-family: var(--font-display); font-weight: 700; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; border: 3px solid var(--bg-elevated); box-shadow: var(--shadow-sm);
    }
    .av-lg img { width: 100%; height: 100%; object-fit: cover; }

    .profile-name {
      font-family: var(--font-display); font-size: 16px; font-weight: 700;
      color: var(--ink-900); line-height: 1.3; margin-bottom: 2px;
    }
    .profile-email {
      font-size: 11px; color: var(--accent); font-family: var(--font-mono);
      word-break: break-all; margin-bottom: 14px;
    }

    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
    .stat-tile { background: var(--bg); border-radius: var(--r-md); padding: 9px 10px; text-align: center; }
    .stat-val {
      font-family: var(--font-display); font-size: 19px; font-weight: 700;
      color: var(--ink-900); display: block; line-height: 1; margin-bottom: 2px;
    }
    .stat-lbl { font-size: 10px; color: var(--ink-400); font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }

    /* MAIN */
    .main-col { display: flex; flex-direction: column; gap: 18px; }

    .summary-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .summary-card {
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: var(--r-lg); padding: 16px 18px;
      display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow-xs);
    }
    .summary-icon {
      width: 38px; height: 38px; border-radius: var(--r-md);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .summary-icon.orange { background: var(--accent-light); color: var(--accent); }
    .summary-icon.green  { background: #e8f5ee; color: #1a6b3a; }
    .summary-icon.blue   { background: #e0f0ff; color: #1455a4; }
    .summary-text strong { display: block; font-family: var(--font-display); font-size: 21px; font-weight: 700; color: var(--ink-900); line-height: 1; margin-bottom: 2px; }
    .summary-text span   { font-size: 11.5px; color: var(--ink-400); font-weight: 500; }

    /* CIRCUITS PANEL */
    .circuits-panel {
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: var(--r-xl); overflow: hidden; box-shadow: var(--shadow-sm);
    }
    .panel-header {
      padding: 14px 20px; border-bottom: 1px solid var(--border-soft);
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-title {
      font-size: 12px; font-weight: 700; color: var(--ink-500);
      letter-spacing: 0.07em; text-transform: uppercase;
      display: flex; align-items: center; gap: 8px;
    }
    .count-chip {
      font-size: 11px; padding: 2px 8px; border-radius: 99px;
      background: var(--bg); color: var(--ink-400);
      font-family: var(--font-mono); border: 1px solid var(--border);
    }
    .new-circuit-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 13px; background: var(--accent); color: #fff;
      border: none; border-radius: var(--r-md); font-size: 13px; font-weight: 600;
      font-family: var(--font-body); cursor: pointer; text-decoration: none;
      transition: background var(--ease);
    }
    .new-circuit-btn:hover { background: var(--accent-dark); }

    .table-head {
      display: grid; grid-template-columns: 1fr 72px 72px 120px;
      gap: 8px; padding: 9px 20px;
      border-bottom: 1px solid var(--border-soft); background: var(--bg);
    }
    .th { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-400); }
    .th.r { text-align: right; }

    .circuit-row {
      display: grid; grid-template-columns: 1fr 72px 72px 120px;
      gap: 8px; align-items: center;
      padding: 13px 20px; border-bottom: 1px solid var(--border-soft);
      transition: background var(--ease);
    }
    .circuit-row:last-child { border-bottom: none; }
    .circuit-row:hover { background: #fdf9f6; }

    .circuit-name-link {
      font-size: 13.5px; font-weight: 600; color: var(--accent);
      text-decoration: none; display: block; margin-bottom: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 320px;
    }
    .circuit-name-link:hover { text-decoration: underline; }
    .circuit-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

    .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; border: 1px solid transparent; }
    .badge-public  { background: #e8f5ee; color: #1a6b3a; border-color: #b5dfc5; }
    .badge-private { background: var(--bg); color: var(--ink-400); border-color: var(--border); }
    .badge-offline { background: #fff8e1; color: #92400e; border-color: #fde68a; }
    .meta-time { font-size: 11px; color: var(--ink-400); }

    .stat-cell {
      display: flex; align-items: center; justify-content: flex-end; gap: 4px;
      font-family: var(--font-display); font-size: 14px; font-weight: 700; color: var(--ink-700);
    }
    .stat-cell svg { color: var(--ink-300); }

    .row-actions { display: flex; align-items: center; justify-content: flex-end; gap: 2px; }
    .row-btn {
      width: 28px; height: 28px; border: none; background: transparent;
      border-radius: var(--r-sm); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--ink-400); transition: all var(--ease);
    }
    .row-btn:hover { background: var(--bg); color: var(--ink-900); }
    .row-btn.danger:hover { background: #fef2f0; color: #c0392b; }

    .vis-toggle {
      display: flex; align-items: center; gap: 3px;
      font-size: 11px; font-weight: 600; padding: 4px 7px;
      border-radius: var(--r-sm); border: 1px solid var(--border);
      background: transparent; color: var(--ink-500);
      cursor: pointer; font-family: var(--font-body); transition: all var(--ease);
    }
    .vis-toggle:hover { background: var(--bg); border-color: var(--ink-300); }

    /* VIEW LINK BUTTON */
    .view-link-btn {
      width: 28px; height: 28px; border: none; background: transparent;
      border-radius: var(--r-sm); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--ink-400); transition: all var(--ease); text-decoration: none;
    }
    .view-link-btn:hover { background: var(--accent-light); color: var(--accent); }

    /* SHIMMER */
    .shimmer {
      background: linear-gradient(90deg, #ede8e1 25%, #e4dfd7 50%, #ede8e1 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: var(--r-sm);
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skel-row { padding: 14px 20px; border-bottom: 1px solid var(--border-soft); display: flex; flex-direction: column; gap: 8px; }

    /* EMPTY */
    .empty-state {
      padding: 56px 24px; text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .empty-icon {
      width: 52px; height: 52px; background: var(--bg); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--ink-300); margin-bottom: 4px;
    }
    .empty-state h3 { font-size: 14px; font-weight: 700; color: var(--ink-700); }
    .empty-state p  { font-size: 13px; color: var(--ink-400); max-width: 200px; line-height: 1.6; }
    .empty-cta {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 20px; background: var(--accent); color: #fff;
      border: none; border-radius: var(--r-md); font-size: 13px; font-weight: 600;
      cursor: pointer; text-decoration: none; font-family: var(--font-body); margin-top: 4px;
    }

    /* SYNC BANNER */
    .sync-banner {
      background: #fffbeb; border-bottom: 1px solid #fde68a; color: #92400e;
      padding: 8px 20px; font-size: 12.5px; font-weight: 500;
      display: none; align-items: center; gap: 10px; justify-content: center;
    }
    .sync-banner.show { display: flex; }

    /* DELETE MODAL */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,.4);
      display: flex; align-items: center; justify-content: center;
      z-index: 900; opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .modal-bg.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: var(--r-xl); padding: 26px; width: 370px; max-width: 92vw;
      transform: translateY(10px); transition: transform .2s; box-shadow: var(--shadow-md);
    }
    .modal-bg.open .modal { transform: translateY(0); }
    .modal-icon {
      width: 42px; height: 42px; border-radius: 50%;
      background: #fef2f0; display: flex; align-items: center;
      justify-content: center; color: #c0392b; margin-bottom: 12px;
    }
    .modal h3 { font-size: 15px; font-weight: 700; color: var(--ink-900); margin-bottom: 6px; }
    .modal p  { font-size: 13px; color: var(--ink-500); line-height: 1.6; }
    .modal-btns { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
    .modal-cancel {
      padding: 8px 16px; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--r-md); font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: var(--font-body); color: var(--ink-700);
    }
    .modal-confirm {
      padding: 8px 16px; background: #c0392b; color: #fff;
      border: none; border-radius: var(--r-md); font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: var(--font-body);
    }

    /* TOAST */
    .toast {
      position: fixed; bottom: 22px; right: 22px;
      padding: 10px 18px; border-radius: var(--r-md);
      font-size: 13px; font-weight: 600; font-family: var(--font-body);
      opacity: 0; transform: translateY(6px); transition: all .22s;
      z-index: 9999; pointer-events: none; box-shadow: var(--shadow-md);
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.ok   { background: #14532d; color: #fff; }
    .toast.err  { background: #7f1d1d; color: #fff; }
    .toast.warn { background: #78350f; color: #fff; }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .page { grid-template-columns: 1fr; }
      .profile-card { position: static; }
      .summary-row { grid-template-columns: 1fr 1fr; }
      .nav-center { display: none; }
    }
    @media (max-width: 640px) {
      .page { padding: 12px; gap: 12px; }
      .summary-row { grid-template-columns: 1fr; }
      .table-head { display: none; }
      .circuit-row { grid-template-columns: 1fr auto; }
      .circuit-row .stat-cell { display: none; }
      .nav-btn span { display: none; }
      .nav-btn { padding: 7px 9px; }
    }
  </style>
</head>
<body>

<div class="sync-banner" id="syncBanner">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
  <span id="syncBannerText">Offline circuits sync ho rahe hain…</span>
</div>

<nav class="nav">
  <div class="nav-inner">
    <a class="nav-logo" href="/">
      <div class="nav-logo-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <rect x="4" y="8" width="4" height="8" rx="1"/><rect x="16" y="8" width="4" height="8" rx="1"/>
          <path d="M8 12h8M2 12h2M20 12h2"/>
        </svg>
      </div>
      Sarkit<span>Lab</span>
    </a>

    <div class="nav-center">
      <div class="nav-search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Search circuits…" />
      </div>
    </div>

    <div class="nav-right">
      <a class="nav-btn btn-primary" href="/create-circuit">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        <span>New Circuit</span>
      </a>
      <div class="nav-divider"></div>
      <a class="nav-btn btn-ghost" href="/edit-profile">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        <span>Edit Profile</span>
      </a>
      <button class="nav-btn btn-danger" id="logoutBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Log Out</span>
      </button>
      <div class="nav-divider"></div>
      <div class="nav-avatar" id="navAvatar"></div>
    </div>
  </div>
</nav>

<div class="page">
  <aside>
    <div class="profile-card">
      <div class="profile-cover"></div>
      <div class="profile-body">
        <div class="profile-av-wrap">
          <div class="av-lg" id="profileAvatar"></div>
        </div>
        <div class="profile-name" id="profileName">—</div>
        <div class="profile-email" id="profileEmail"></div>
        <div class="stat-grid">
          <div class="stat-tile">
            <span class="stat-val" id="statTotal">0</span>
            <div class="stat-lbl">Circuits</div>
          </div>
          <div class="stat-tile">
            <span class="stat-val" id="statPublic">0</span>
            <div class="stat-lbl">Public</div>
          </div>
          <div class="stat-tile">
            <span class="stat-val" id="statFollowers">—</span>
            <div class="stat-lbl">Followers</div>
          </div>
          <div class="stat-tile">
            <span class="stat-val" id="statFollowing">—</span>
            <div class="stat-lbl">Following</div>
          </div>
        </div>
      </div>
    </div>
  </aside>

  <main class="main-col">
    <div class="summary-row">
      <div class="summary-card">
        <div class="summary-icon orange">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 9h6M9 13h4"/></svg>
        </div>
        <div class="summary-text">
          <strong id="sumTotal">0</strong>
          <span>Total Circuits</span>
        </div>
      </div>
      <div class="summary-card">
        <div class="summary-icon green">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </div>
        <div class="summary-text">
          <strong id="sumPublic">0</strong>
          <span>Public</span>
        </div>
      </div>
      <div class="summary-card">
        <div class="summary-icon blue">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </div>
        <div class="summary-text">
          <strong id="sumLikes">0</strong>
          <span>Total Likes</span>
        </div>
      </div>
    </div>

    <div class="circuits-panel">
      <div class="panel-header">
        <div class="panel-title">
          My Circuits
          <span class="count-chip" id="projCount">0</span>
        </div>
        <a class="new-circuit-btn" href="/create-circuit">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          New
        </a>
      </div>

      <div class="table-head">
        <div class="th">Title</div>
        <div class="th r">Likes</div>
        <div class="th r">Views</div>
        <div class="th r">Actions</div>
      </div>

      <div id="projList">
        <div class="skel-row"><div class="shimmer" style="height:13px;width:52%"></div><div class="shimmer" style="height:11px;width:30%"></div></div>
        <div class="skel-row"><div class="shimmer" style="height:13px;width:67%"></div><div class="shimmer" style="height:11px;width:25%"></div></div>
        <div class="skel-row"><div class="shimmer" style="height:13px;width:40%"></div><div class="shimmer" style="height:11px;width:35%"></div></div>
      </div>
    </div>
  </main>
</div>

<div class="modal-bg" id="delModal">
  <div class="modal">
    <div class="modal-icon">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>
    </div>
    <h3>Delete Circuit?</h3>
    <p id="delModalMsg">Ye circuit permanently delete ho jaega.</p>
    <div class="modal-btns">
      <button class="modal-cancel" id="delCancel">Cancel</button>
      <button class="modal-confirm" id="delConfirm">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { getSession, logoutUser, getUserProfile } from "/src/utils/auth.js";
  import { app }                                    from "/src/utils/auth.js";
  import { listenFollowerCount, listenFollowingCount } from "/src/utils/follows.js";
  import {
    getFirestore, collection, query, where,
    getDocs, deleteDoc, doc, updateDoc, getDoc, setDoc,
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const db      = getFirestore(app);
  const session = getSession();
  if (!session) { window.location.replace("/login"); }
  const uid = session.uid;

  let unsubFollowers = null;
  let unsubFollowing = null;

  function toast(msg, type = "") {
    const el = document.getElementById("toast");
    el.textContent = msg; el.className = "toast " + type + " show";
    clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove("show"), 2800);
  }

  function initials(name) {
    if (!name?.trim()) return "?";
    return name.trim().split(/\s+/).map(w => w[0]).join("").toUpperCase().slice(0, 2);
  }

  function tsMillis(ts) {
    if (!ts) return 0;
    if (typeof ts === "number") return ts;
    if (typeof ts === "object" && "toMillis" in ts) return ts.toMillis();
    if (typeof ts === "object" && "toDate"   in ts) return ts.toDate().getTime();
    return new Date(ts).getTime() || 0;
  }

  function timeAgo(ts) {
    const ms = tsMillis(ts);
    if (!ms) return "";
    const diff = Date.now() - ms;
    const mins = Math.floor(diff / 60000);
    if (mins < 1)  return "just now";
    if (mins < 60) return mins + "m ago";
    const hrs = Math.floor(mins / 60);
    if (hrs < 24)  return hrs + "h ago";
    const days = Math.floor(hrs / 24);
    if (days < 30) return days + "d ago";
    return new Date(ms).toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" });
  }

  function esc(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function makeAv(el, name, photoURL) {
    el.innerHTML = "";
    if (photoURL) {
      const img = document.createElement("img");
      img.src = photoURL; img.alt = "";
      img.onerror = () => { el.innerHTML = ""; el.textContent = initials(name); };
      el.appendChild(img);
    } else {
      el.textContent = initials(name);
    }
  }

  function slugify(name) {
    return (name || "untitled").toLowerCase().trim()
      .replace(/[^a-z0-9\s-]/g,"").replace(/\s+/g,"-").replace(/-+/g,"-").slice(0,60);
  }

  function buildViewUrl(proj) {
    const slug = proj.slug || slugify(proj.name || "untitled");
    return `/circuit-view?project=${proj.id}&name=${encodeURIComponent(slug)}`;
  }

  async function loadProfile() {
    const profile = await getUserProfile(uid).catch(() => null) || session;
    const name    = profile.displayName || session.displayName || "User";
    const email   = profile.email       || session.email       || "";
    const photo   = profile.photoURL    || session.photoURL    || null;

    makeAv(document.getElementById("profileAvatar"), name, photo);
    makeAv(document.getElementById("navAvatar"),     name, photo);
    document.getElementById("profileName").textContent  = name;
    document.getElementById("profileEmail").textContent = email;

    unsubFollowers = listenFollowerCount(uid, count => {
      document.getElementById("statFollowers").textContent = count;
    });
    unsubFollowing = listenFollowingCount(uid, count => {
      document.getElementById("statFollowing").textContent = count;
    });
  }

  function localProjects() {
    const list = JSON.parse(localStorage.getItem(`all_projects_${uid}`) || "[]");
    const out  = [];
    for (const p of list) {
      const raw = localStorage.getItem(`sks_proj_${p.id}`) || localStorage.getItem(`project_${p.id}`);
      if (!raw) continue;
      try { out.push({ id: p.id, ...JSON.parse(raw), source: "local" }); } catch {}
    }
    out.sort((a, b) => (b.localUpdatedAt || b.timestamp || 0) - (a.localUpdatedAt || a.timestamp || 0));
    return out;
  }

  async function syncOfflineToCloud() {
    if (!navigator.onLine) return;
    const list = JSON.parse(localStorage.getItem(`all_projects_${uid}`) || "[]");
    if (!list.length) return;

    const toSync = list.filter(p =>
      !!(localStorage.getItem(`sks_proj_${p.id}`) || localStorage.getItem(`project_${p.id}`))
    );
    if (!toSync.length) return;

    const banner     = document.getElementById("syncBanner");
    const bannerText = document.getElementById("syncBannerText");
    banner.classList.add("show");
    bannerText.textContent = `${toSync.length} circuit${toSync.length > 1 ? "s" : ""} sync ho raha hai…`;

    let synced  = 0;
    const newList = [...list];

    for (const p of toSync) {
      try {
        const rawKey = localStorage.getItem(`sks_proj_${p.id}`) ? `sks_proj_${p.id}` : `project_${p.id}`;
        const data   = JSON.parse(localStorage.getItem(rawKey));
        await setDoc(doc(db, "projects", p.id), { ...data, authorUid: uid, syncedAt: Date.now() });
        localStorage.removeItem(rawKey);
        localStorage.removeItem(`sks_proj_${p.id}`);
        const idx = newList.findIndex(x => x.id === p.id);
        if (idx !== -1) newList[idx] = { id: p.id, name: data.name, slug: data.slug, date: data.timestamp };
        synced++;
        bannerText.textContent = `${synced}/${toSync.length} synced…`;
      } catch (err) {
        console.error(`[Sync] Failed for ${p.id}:`, err);
      }
    }

    localStorage.setItem(`all_projects_${uid}`, JSON.stringify(newList));
    if (synced > 0) {
      bannerText.textContent = `✓ ${synced} circuit${synced > 1 ? "s" : ""} synced!`;
      setTimeout(() => banner.classList.remove("show"), 3000);
      loadProjects();
    } else {
      banner.classList.remove("show");
    }
  }

  window.addEventListener("online", syncOfflineToCloud);
  if (navigator.onLine) setTimeout(syncOfflineToCloud, 2000);

  const STATS_CACHE_TTL = 5 * 60 * 1000;

  async function batchFetchStats(projectIds) {
    if (!projectIds.length) return {};
    const cacheKey = `statsCache_${uid}`;
    const now      = Date.now();
    try {
      const cached = JSON.parse(sessionStorage.getItem(cacheKey) || "null");
      if (cached && (now - cached.ts) < STATS_CACHE_TTL && projectIds.every(id => id in cached.data))
        return cached.data;
    } catch {}

    const stats = {};
    for (let i = 0; i < projectIds.length; i += 30) {
      const chunk = projectIds.slice(i, i + 30);
      try {
        const snap = await getDocs(query(collection(db, "projectStats"), where("__name__", "in", chunk)));
        snap.forEach(d => { stats[d.id] = d.data(); });
      } catch (err) { console.error("[Stats] Batch fetch:", err); }
    }
    try { sessionStorage.setItem(cacheKey, JSON.stringify({ ts: now, data: stats })); } catch {}
    return stats;
  }

  function invalidateStatsCache() {
    try { sessionStorage.removeItem(`statsCache_${uid}`); } catch {}
  }

  const I = {
    heart:  `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`,
    eye:    `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`,
    eyeOff: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`,
    open:   `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`,
    globe:  `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
    trash:  `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>`,
  };

  let deleteTarget = null;

  async function renderProjects(projects, fromLocal) {
    const listEl = document.getElementById("projList");
    const total  = projects.length;
    const pubCnt = projects.filter(p => p.isPublic).length;

    document.getElementById("projCount").textContent  = total;
    document.getElementById("statTotal").textContent  = total;
    document.getElementById("statPublic").textContent = pubCnt;
    document.getElementById("sumTotal").textContent   = total;
    document.getElementById("sumPublic").textContent  = pubCnt;

    if (!total) {
      listEl.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 9h6M9 13h4"/></svg></div>
          <h3>Koi circuit nahi</h3>
          <p>Apna pehla circuit banao aur yahan save karo.</p>
          <a class="empty-cta" href="/create-circuit">Create Circuit</a>
        </div>`;
      return;
    }

    listEl.innerHTML = "";

    for (const proj of projects) {
      const isPublic = !!proj.isPublic;
      const isLocal  = fromLocal || proj.source === "local";
      const ts       = proj.updatedAt || proj.localUpdatedAt || proj.timestamp;
      const editUrl  = `/create-circuit?project=${proj.id}&name=${encodeURIComponent(proj.slug || slugify(proj.name || ""))}`;
      const viewUrl  = buildViewUrl(proj);

      const row     = document.createElement("div");
      row.className = "circuit-row";
      row.dataset.id = proj.id;
      row.innerHTML = `
        <div>
          <a class="circuit-name-link" href="${editUrl}">${esc(proj.name || "Untitled Circuit")}</a>
          <div class="circuit-meta">
            <span class="badge ${isPublic ? "badge-public" : "badge-private"}" id="badge-${proj.id}">${isPublic ? "Public" : "Private"}</span>
            <span class="meta-time">${timeAgo(ts)}</span>
            ${isLocal ? `<span class="badge badge-offline">offline</span>` : ""}
          </div>
        </div>
        <div class="stat-cell" id="likes-${proj.id}">${I.heart} <span>—</span></div>
        <div class="stat-cell" id="views-${proj.id}">${I.eye} <span>—</span></div>
        <div class="row-actions">
          <button class="vis-toggle" id="vis-${proj.id}" data-id="${proj.id}" data-public="${isPublic}" title="${isPublic ? "Make private" : "Make public"}">
            ${isPublic ? I.eye + " Pub" : I.eyeOff + " Priv"}
          </button>
          ${isPublic ? `<a class="view-link-btn" href="${viewUrl}" title="Public view" target="_blank">${I.globe}</a>` : `<span style="width:28px"></span>`}
          <button class="row-btn" title="Edit" onclick="window.location.href='${editUrl}'">${I.open}</button>
          <button class="row-btn danger" data-id="${proj.id}" data-name="${esc(proj.name || "Untitled")}" title="Delete">${I.trash}</button>
        </div>`;
      listEl.appendChild(row);
    }

    listEl.querySelectorAll(".row-btn.danger").forEach(btn => {
      btn.addEventListener("click", () => {
        deleteTarget = { id: btn.dataset.id, name: btn.dataset.name };
        document.getElementById("delModalMsg").textContent = `"${deleteTarget.name}" permanently delete ho jaega.`;
        document.getElementById("delModal").classList.add("open");
      });
    });

    listEl.querySelectorAll(".vis-toggle").forEach(btn => {
      btn.addEventListener("click", async () => {
        const id     = btn.dataset.id;
        const nowPub = btn.dataset.public !== "true";
        try {
          await updateDoc(doc(db, "projects", id), { isPublic: nowPub });
          btn.dataset.public = String(nowPub);
          const row   = document.querySelector(`.circuit-row[data-id="${id}"]`);
          const badge = document.getElementById("badge-" + id);
          if (badge) { badge.textContent = nowPub ? "Public" : "Private"; badge.className = "badge " + (nowPub ? "badge-public" : "badge-private"); }
          btn.innerHTML = nowPub ? I.eye + " Pub" : I.eyeOff + " Priv";

          const viewSlot = btn.nextElementSibling;
          if (viewSlot) {
            const proj    = projects.find(p => p.id === id);
            const viewUrl = proj ? buildViewUrl(proj) : "#";
            viewSlot.outerHTML = nowPub
              ? `<a class="view-link-btn" href="${viewUrl}" title="Public view" target="_blank">${I.globe}</a>`
              : `<span style="width:28px"></span>`;
          }

          document.getElementById("sumPublic").textContent  = document.querySelectorAll(".badge-public").length;
          document.getElementById("statPublic").textContent = document.querySelectorAll(".badge-public").length;
          toast(nowPub ? "Circuit ab public hai" : "Circuit ab private hai", "ok");
        } catch { toast("Visibility update nahi ho paya", "err"); }
      });
    });

    if (!fromLocal && projects.length > 0) {
      const stats    = await batchFetchStats(projects.map(p => p.id));
      let totalLikes = 0;
      for (const proj of projects) {
        const d  = stats[proj.id] || {};
        totalLikes += (d.likes || 0);
        const lEl = document.getElementById("likes-" + proj.id);
        const vEl = document.getElementById("views-" + proj.id);
        if (lEl) lEl.innerHTML = I.heart + " <span>" + (d.likes || 0) + "</span>";
        if (vEl) vEl.innerHTML = I.eye   + " <span>" + (d.views || 0) + "</span>";
      }
      document.getElementById("sumLikes").textContent = totalLikes;
    }
  }

  async function loadProjects() {
    const listEl = document.getElementById("projList");
    try {
      const snap     = await getDocs(query(collection(db, "projects"), where("authorUid", "==", uid)));
      const projects = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      projects.sort((a, b) => tsMillis(b.updatedAt || b.timestamp) - tsMillis(a.updatedAt || a.timestamp));
      renderProjects(projects, false);
    } catch (err) {
      console.error("[Dashboard] Firestore query failed:", err.code, err.message);
      const local = localProjects();
      if (local.length > 0) {
        toast("Offline data dikh raha hai", "warn");
        renderProjects(local, true);
      } else {
        listEl.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon" style="background:#fef2f0;color:#c0392b;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
            <h3>Load nahi hua</h3>
            <p style="color:#c0392b;font-family:var(--font-mono);font-size:11px;">${err.code}: ${err.message}</p>
            <button class="empty-cta" onclick="location.reload()">Retry</button>
          </div>`;
      }
    }
  }

  document.getElementById("searchInput")?.addEventListener("input", function() {
    const q = this.value.toLowerCase();
    document.querySelectorAll(".circuit-row").forEach(row => {
      const name = row.querySelector(".circuit-name-link")?.textContent?.toLowerCase() || "";
      row.style.display = name.includes(q) ? "" : "none";
    });
  });

  document.getElementById("delCancel").addEventListener("click", () => {
    document.getElementById("delModal").classList.remove("open"); deleteTarget = null;
  });

  document.getElementById("delConfirm").addEventListener("click", async () => {
    if (!deleteTarget) return;
    const { id, name } = deleteTarget;
    document.getElementById("delModal").classList.remove("open"); deleteTarget = null;
    try {
      await deleteDoc(doc(db, "projects", id));
      localStorage.removeItem(`sks_proj_${id}`);
      localStorage.removeItem(`project_${id}`);
      const lk   = `all_projects_${uid}`;
      const list = JSON.parse(localStorage.getItem(lk) || "[]").filter(p => p.id !== id);
      localStorage.setItem(lk, JSON.stringify(list));
      invalidateStatsCache();
      toast(`"${name}" delete ho gaya`, "ok");
      loadProjects();
    } catch { toast("Delete nahi ho paya. Dobara try karo.", "err"); }
  });

  document.getElementById("logoutBtn").addEventListener("click", async () => {
    await logoutUser();
    window.location.replace("/login");
  });

  document.getElementById("delModal").addEventListener("click", e => {
    if (e.target === document.getElementById("delModal")) {
      document.getElementById("delModal").classList.remove("open"); deleteTarget = null;
    }
  });

  window.addEventListener("beforeunload", () => {
    unsubFollowers?.();
    unsubFollowing?.();
  });

  loadProfile();
  loadProjects();
</script>
</body>
</html>
