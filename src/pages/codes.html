#include <Wire.h>
#include <Adafruit_GFX.h>
#include <Adafruit_SSD1306.h>

#define SCREEN_WIDTH 128
#define SCREEN_HEIGHT 64
#define OLED_RESET -1  // reset pin not used
Adafruit_SSD1306 display(SCREEN_WIDTH, SCREEN_HEIGHT, &Wire, OLED_RESET);

void setup() {
  Serial.begin(9600);

  // OLED initialize
  if(!display.begin(SSD1306_SWITCHCAPVCC, 0x3C)) {
    Serial.println("SSD1306 allocation failed"); // parser-friendly
    for(;;);
  }

  display.clearDisplay();
  display.setTextSize(1);      // small text
  display.setTextColor(SSD1306_WHITE);
  display.setCursor(0,0);
  display.println("Hello, Tinkercad!");
  display.println("OLED Ready");
  display.display();
  delay(1000);
}

void loop() {
  // scrolling text example
  static int offset = 0;
  String msg = "This is scrolling text! ";
  
  display.clearDisplay();
  display.setCursor(-offset, 10);  // move text left by offset
  display.println(msg);
  display.display();

  offset++;                        // move text
  if(offset > msg.length() * 6) {  // 6 pixels per char for text size 1
    offset = 0;
  }

  delay(100); // scroll speed
}

#define TRIG_PIN 9
#define ECHO_PIN 10

long duration;
float distance;

void setup() {
  Serial.begin(9600);

  pinMode(TRIG_PIN, OUTPUT);
  pinMode(ECHO_PIN, INPUT);
}

void loop() {
  // Trigger pulse
  digitalWrite(TRIG_PIN, LOW);
  delayMicroseconds(2);

  digitalWrite(TRIG_PIN, HIGH);
  delayMicroseconds(10);
  digitalWrite(TRIG_PIN, LOW);

  // Echo time read
  duration = pulseIn(ECHO_PIN, HIGH);

  // Distance in cm
  distance = duration * 0.0343 / 2;

  Serial.print("Distance: ");
  Serial.print(distance);
  Serial.println(" cm");

  delay(500);
}
