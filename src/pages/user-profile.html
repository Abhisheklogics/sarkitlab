<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — SarkitLab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../style.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --nav-h: 58px;
      --accent: #c4611a;
      --accent-dark: #a34f13;
      --accent-light: #fff2e8;
      --ink-900: #1a1714;
      --ink-700: #3d3730;
      --ink-500: #6b6259;
      --ink-400: #8c8178;
      --ink-300: #b5aca3;
      --bg: #f5f2ee;
      --bg-el: #ffffff;
      --border: #e8e3dc;
      --border-soft: #ede8e1;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Plus Jakarta Sans', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --r-sm: 6px; --r-md: 10px; --r-lg: 16px; --r-xl: 22px;
      --shadow-xs: 0 1px 3px rgba(0,0,0,.06);
      --shadow-sm: 0 2px 8px rgba(0,0,0,.08);
      --shadow-md: 0 4px 20px rgba(0,0,0,.10);
      --ease: .18s ease;
    }

    body { font-family: var(--font-body); background: var(--bg); color: var(--ink-700); min-height: 100vh; }

    .nav {
      height: var(--nav-h); background: var(--bg-el); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 200; box-shadow: var(--shadow-xs);
    }
    .nav-inner {
      max-width: 1100px; margin: 0 auto; padding: 0 24px;
      height: 100%; display: flex; align-items: center; gap: 12px;
    }
    .nav-logo {
      font-family: var(--font-display); font-size: 19px; font-weight: 700;
      color: var(--ink-900); text-decoration: none; letter-spacing: -0.02em; flex-shrink: 0;
    }
    .nav-logo span { color: var(--accent); }
    .nav-right { margin-left: auto; display: flex; align-items: center; gap: 6px; }
    .nav-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: var(--r-md);
      font-family: var(--font-body); font-size: 13px; font-weight: 600;
      cursor: pointer; text-decoration: none; border: 1px solid transparent; transition: all var(--ease);
    }
    .btn-ghost { background: transparent; border-color: var(--border); color: var(--ink-700); }
    .btn-ghost:hover { background: var(--bg); }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-accent:hover { background: var(--accent-dark); }
    .nav-sep { width: 1px; height: 22px; background: var(--border); }

    .page { max-width: 1100px; margin: 0 auto; padding: 28px 24px; display: grid; grid-template-columns: 280px 1fr; gap: 22px; align-items: start; }

    .profile-card {
      background: var(--bg-el); border: 1px solid var(--border);
      border-radius: var(--r-xl); overflow: hidden; box-shadow: var(--shadow-sm);
      position: sticky; top: calc(var(--nav-h) + 16px);
    }
    .cover { height: 60px; background: linear-gradient(120deg, #c4611a 0%, #e07b39 55%, #f5b97a 100%); }
    .profile-body { padding: 0 18px 20px; }
    .av-wrap { margin-top: -26px; margin-bottom: 12px; display: flex; align-items: flex-end; justify-content: space-between; }
    .av-lg {
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--accent); color: #fff; font-family: var(--font-display); font-weight: 700; font-size: 20px;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
      border: 3px solid var(--bg-el); box-shadow: var(--shadow-sm);
    }
    .av-lg img { width: 100%; height: 100%; object-fit: cover; }
    .follow-btn {
      padding: 6px 14px; border-radius: var(--r-md); font-size: 12px; font-weight: 600;
      font-family: var(--font-body); cursor: pointer; border: 1px solid var(--border);
      background: transparent; color: var(--ink-700); transition: all var(--ease); margin-top: 4px;
    }
    .follow-btn.following { background: var(--accent); color: #fff; border-color: var(--accent); }
    .follow-btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
    .follow-btn.following:hover { background: var(--accent-dark); }

    .profile-name { font-family: var(--font-display); font-size: 17px; font-weight: 700; color: var(--ink-900); margin-bottom: 2px; }
    .profile-bio { font-size: 12px; color: var(--ink-500); line-height: 1.6; margin-bottom: 4px; }
    .profile-email { font-size: 11px; color: var(--accent); font-family: var(--font-mono); margin-bottom: 14px; word-break: break-all; }
    .profile-role { font-size: 11px; color: var(--ink-400); margin-bottom: 14px; }

    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
    .stat-tile { background: var(--bg); border-radius: var(--r-md); padding: 9px 10px; text-align: center; cursor: pointer; transition: background var(--ease); }
    .stat-tile:hover { background: var(--accent-light); }
    .stat-val { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--ink-900); display: block; line-height: 1; margin-bottom: 2px; }
    .stat-lbl { font-size: 10px; color: var(--ink-400); font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }

    .main-col { display: flex; flex-direction: column; gap: 18px; }

    .summary-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .summary-card {
      background: var(--bg-el); border: 1px solid var(--border); border-radius: var(--r-lg);
      padding: 16px 18px; display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow-xs);
    }
    .si { width: 38px; height: 38px; border-radius: var(--r-md); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .si.orange { background: var(--accent-light); color: var(--accent); }
    .si.green { background: #e8f5ee; color: #1a6b3a; }
    .si.blue { background: #e0f0ff; color: #1455a4; }
    .summary-text strong { display: block; font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--ink-900); line-height: 1; margin-bottom: 2px; }
    .summary-text span { font-size: 11.5px; color: var(--ink-400); font-weight: 500; }

    .panel {
      background: var(--bg-el); border: 1px solid var(--border);
      border-radius: var(--r-xl); overflow: hidden; box-shadow: var(--shadow-sm);
    }
    .panel-header {
      padding: 14px 20px; border-bottom: 1px solid var(--border-soft);
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-title {
      font-size: 12px; font-weight: 700; color: var(--ink-500);
      letter-spacing: 0.07em; text-transform: uppercase; display: flex; align-items: center; gap: 8px;
    }
    .count-chip {
      font-size: 11px; padding: 2px 8px; border-radius: 99px;
      background: var(--bg); color: var(--ink-400); font-family: var(--font-mono); border: 1px solid var(--border);
    }

    .circuit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; padding: 16px; }
    .circuit-card {
      background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-lg);
      overflow: hidden; transition: all var(--ease); cursor: pointer; text-decoration: none;
    }
    .circuit-card:hover { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(196,97,26,.08); transform: translateY(-1px); }
    .circuit-thumb {
      height: 110px; background: linear-gradient(135deg, #f0ede8 0%, #e8e3db 100%);
      display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--border);
      position: relative; overflow: hidden;
    }
    .circuit-thumb svg { opacity: 0.18; }
    .circuit-thumb-badge {
      position: absolute; top: 8px; right: 8px;
      font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px;
      border: 1px solid transparent;
    }
    .badge-public { background: #e8f5ee; color: #1a6b3a; border-color: #b5dfc5; }
    .circuit-info { padding: 10px 12px; }
    .circuit-name { font-size: 13px; font-weight: 700; color: var(--ink-900); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .circuit-meta { display: flex; align-items: center; justify-content: space-between; }
    .circuit-stats { display: flex; align-items: center; gap: 10px; }
    .stat-pill { display: flex; align-items: center; gap: 3px; font-size: 11px; color: var(--ink-400); }

    .empty-state { padding: 56px 24px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .empty-icon { width: 52px; height: 52px; background: var(--bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--ink-300); margin-bottom: 4px; }
    .empty-state h3 { font-size: 14px; font-weight: 700; color: var(--ink-700); }
    .empty-state p { font-size: 13px; color: var(--ink-400); max-width: 220px; line-height: 1.6; }

    .shimmer { background: linear-gradient(90deg, #ede8e1 25%, #e4dfd7 50%, #ede8e1 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: var(--r-sm); }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .toast {
      position: fixed; bottom: 22px; right: 22px; padding: 10px 18px; border-radius: var(--r-md);
      font-size: 13px; font-weight: 600; font-family: var(--font-body); opacity: 0;
      transform: translateY(6px); transition: all .22s; z-index: 9999; pointer-events: none; box-shadow: var(--shadow-md);
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.ok { background: #14532d; color: #fff; }
    .toast.err { background: #7f1d1d; color: #fff; }

    @media (max-width: 900px) {
      .page { grid-template-columns: 1fr; }
      .profile-card { position: static; }
      .summary-row { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 640px) {
      .page { padding: 12px; }
      .summary-row { grid-template-columns: 1fr; }
      .circuit-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a class="nav-logo" href="/">Sarkit<span>Lab</span></a>
    <div class="nav-right">
      <a class="nav-btn btn-ghost" href="/user-profile" id="dashLink">Dashboard</a>
      <div class="nav-sep"></div>
      <a class="nav-btn btn-accent" href="/create-circuit">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        New Circuit
      </a>
    </div>
  </div>
</nav>

<div class="page">
  <aside>
    <div class="profile-card">
      <div class="cover"></div>
      <div class="profile-body">
        <div class="av-wrap">
          <div class="av-lg" id="profileAvatar"></div>
          <button class="follow-btn" id="followBtn" style="display:none"></button>
        </div>
        <div class="profile-name" id="profileName">—</div>
        <div class="profile-bio" id="profileBio"></div>
        <div class="profile-role" id="profileRole"></div>
        <div class="profile-email" id="profileEmail"></div>
        <div class="stat-grid">
          <div class="stat-tile" id="tileCircuits">
            <span class="stat-val" id="statCircuits">0</span>
            <div class="stat-lbl">Circuits</div>
          </div>
          <div class="stat-tile" id="tileLikes">
            <span class="stat-val" id="statLikes">0</span>
            <div class="stat-lbl">Total Likes</div>
          </div>
          <div class="stat-tile" id="tileFollowers" style="cursor:pointer">
            <span class="stat-val" id="statFollowers">—</span>
            <div class="stat-lbl">Followers</div>
          </div>
          <div class="stat-tile" id="tileFollowing" style="cursor:pointer">
            <span class="stat-val" id="statFollowing">—</span>
            <div class="stat-lbl">Following</div>
          </div>
        </div>
      </div>
    </div>
  </aside>

  <main class="main-col">
    <div class="summary-row">
      <div class="summary-card">
        <div class="si orange">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 9h6M9 13h4"/></svg>
        </div>
        <div class="summary-text">
          <strong id="sumCircuits">0</strong>
          <span>Public circuits</span>
        </div>
      </div>
      <div class="summary-card">
        <div class="si green">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </div>
        <div class="summary-text">
          <strong id="sumLikes">0</strong>
          <span>Total likes</span>
        </div>
      </div>
      <div class="summary-card">
        <div class="si blue">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </div>
        <div class="summary-text">
          <strong id="sumViews">0</strong>
          <span>Total views</span>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">
          Public Circuits
          <span class="count-chip" id="circuitCount">0</span>
        </div>
      </div>
      <div class="circuit-grid" id="circuitGrid">
        <div style="grid-column:1/-1;padding:16px;display:flex;flex-direction:column;gap:10px;">
          <div class="shimmer" style="height:110px;border-radius:var(--r-lg)"></div>
          <div class="shimmer" style="height:13px;width:60%"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { getSession, getUserProfile } from "/src/utils/auth.js";
  import { app } from "/src/utils/auth.js";
  import { toggleFollow, isFollowing, listenFollowerCount, listenFollowingCount } from "/src/utils/follows.js";
  import {
    getFirestore, collection, query, where, getDocs, doc, getDoc,
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const db = getFirestore(app);
  const session = getSession();
  const params = new URLSearchParams(window.location.search);
  const targetUid = params.get("uid") || session?.uid;

  if (!targetUid) { window.location.replace("/login"); }

  const isSelf = session && session.uid === targetUid;
  if (isSelf) document.getElementById("dashLink").textContent = "Dashboard";

  function toast(msg, type = "ok") {
    const el = document.getElementById("toast");
    el.textContent = msg; el.className = "toast " + type + " show";
    clearTimeout(el.tid); el.tid = setTimeout(() => el.classList.remove("show"), 2600);
  }

  function initials(name) {
    if (!name?.trim()) return "?";
    return name.trim().split(/\s+/).map(w => w[0]).join("").toUpperCase().slice(0, 2);
  }

  function makeAvatar(el, name, photoURL) {
    el.innerHTML = "";
    if (photoURL) {
      const img = document.createElement("img");
      img.src = photoURL; img.alt = "";
      img.onerror = () => { el.innerHTML = ""; el.textContent = initials(name); };
      el.appendChild(img);
    } else {
      el.textContent = initials(name);
    }
  }

  function timeAgo(ts) {
    if (!ts) return "";
    const ms = typeof ts === "object" && "toMillis" in ts ? ts.toMillis() : (typeof ts === "number" ? ts : new Date(ts).getTime());
    const diff = Date.now() - ms;
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return "just now";
    if (mins < 60) return mins + "m ago";
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + "h ago";
    const days = Math.floor(hrs / 24);
    if (days < 30) return days + "d ago";
    return new Date(ms).toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" });
  }

  function slugify(name) {
    return (name || "untitled").toLowerCase().trim().replace(/[^a-z0-9\s-]/g, "").replace(/\s+/g, "-").replace(/-+/g, "-").slice(0, 60);
  }

  async function loadProfile() {
    const profile = await getUserProfile(targetUid).catch(() => null);
    if (!profile) { toast("Profile nahi mila", "err"); return; }

    makeAvatar(document.getElementById("profileAvatar"), profile.displayName, profile.photoURL);
    document.getElementById("profileName").textContent = profile.displayName || "User";
    document.getElementById("profileEmail").textContent = profile.email || "";
    document.getElementById("profileBio").textContent = profile.bio || "";
    document.getElementById("profileRole").textContent = [profile.role, profile.institution].filter(Boolean).join(" at ") || "";
    document.title = (profile.displayName || "User") + " — SarkitLab";

    listenFollowerCount(targetUid, n => document.getElementById("statFollowers").textContent = n);
    listenFollowingCount(targetUid, n => document.getElementById("statFollowing").textContent = n);

    if (!isSelf && session) {
      const followBtn = document.getElementById("followBtn");
      followBtn.style.display = "block";
      const already = await isFollowing(targetUid).catch(() => false);
      followBtn.textContent = already ? "Following" : "Follow";
      followBtn.className = "follow-btn" + (already ? " following" : "");
      followBtn.addEventListener("click", async () => {
        followBtn.disabled = true;
        const result = await toggleFollow(targetUid).catch(() => null);
        if (!result?.success) { followBtn.disabled = false; return; }
        const nowFollowing = followBtn.textContent !== "Following";
        followBtn.textContent = nowFollowing ? "Following" : "Follow";
        followBtn.className = "follow-btn" + (nowFollowing ? " following" : "");
        followBtn.disabled = false;
      });
    }
  }

  async function loadCircuits() {
    const grid = document.getElementById("circuitGrid");

    try {
      const snap = await getDocs(
        query(collection(db, "projects"),
          where("authorUid", "==", targetUid),
          where("isPublic", "==", true)
        )
      );

      const projects = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      projects.sort((a, b) => {
        const at = a.updatedAt?.toMillis?.() || a.timestamp || 0;
        const bt = b.updatedAt?.toMillis?.() || b.timestamp || 0;
        return bt - at;
      });

      document.getElementById("circuitCount").textContent = projects.length;
      document.getElementById("statCircuits").textContent = projects.length;
      document.getElementById("sumCircuits").textContent = projects.length;

      if (!projects.length) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <div class="empty-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 9h6M9 13h4"/></svg></div>
            <h3>Koi public circuit nahi</h3>
            <p>Is user ne abhi koi circuit public nahi ki.</p>
          </div>`;
        return;
      }

      grid.innerHTML = "";
      let totalLikes = 0, totalViews = 0;

      const statsIds = projects.map(p => p.id);
      const statsMap = {};

      for (let i = 0; i < statsIds.length; i += 30) {
        const chunk = statsIds.slice(i, i + 30);
        try {
          const statsSnap = await getDocs(
           query(collection(db, "projectStats"), where("__name__", "in", chunk))
          );
          statsSnap.forEach(d => { statsMap[d.id] = d.data(); });
        } catch {}
      }

      for (const proj of projects) {
        const s = statsMap[proj.id] || {};
        const likes = s.likes || 0;
        const views = s.views || 0;
        totalLikes += likes;
        totalViews += views;

        const slug = proj.slug || slugify(proj.name || "");
       const circuitUrl = `/create-circuit?project=${proj.id}&name=${encodeURIComponent(slug)}&autorun=1`;

        const card = document.createElement("a");
        card.className = "circuit-card";
     card.href = circuitUrl;
        card.innerHTML = `
          <div class="circuit-thumb">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="4" y="8" width="4" height="8" rx="1"/><rect x="16" y="8" width="4" height="8" rx="1"/>
              <path d="M8 12h8M2 12h2M20 12h2"/>
            </svg>
            <span class="circuit-thumb-badge badge-public">Public</span>
          </div>
          <div class="circuit-info">
            <div class="circuit-name">${proj.name || "Untitled Circuit"}</div>
            <div class="circuit-meta">
              <div class="circuit-stats">
                <span class="stat-pill">
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                  ${likes}
                </span>
                <span class="stat-pill">
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  ${views}
                </span>
              </div>
              <span style="font-size:11px;color:var(--ink-400)">${timeAgo(proj.updatedAt || proj.timestamp)}</span>
            </div>
          </div>`;
        grid.appendChild(card);
      }

      document.getElementById("statLikes").textContent = totalLikes;
      document.getElementById("sumLikes").textContent = totalLikes;
      document.getElementById("sumViews").textContent = totalViews;

    } catch (err) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <h3>Load nahi hua</h3>
          <p style="color:#c0392b;font-family:var(--font-mono);font-size:11px;">${err.message}</p>
        </div>`;
    }
  }

  loadProfile();
  loadCircuits();
</script>
</body>
</html>
