<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — SarkitLab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent:      #c4611a; --accent-dark: #a34f13; --accent-lt: #fff2e8;
      --ink-900: #1a1714; --ink-700: #3d3730; --ink-500: #6b6259; --ink-400: #8c8178; --ink-300: #b5aca3;
      --bg: #f5f2ee; --bg-up: #ffffff; --border: #e8e3dc; --border-s: #ede8e1;
      --font-d: 'Playfair Display', Georgia, serif;
      --font-b: 'Plus Jakarta Sans', system-ui, sans-serif;
      --font-m: 'JetBrains Mono', monospace;
      --r-sm:6px; --r-md:10px; --r-lg:16px; --r-xl:22px;
      --sh-xs:0 1px 3px rgba(0,0,0,.06); --sh-sm:0 2px 8px rgba(0,0,0,.08); --sh-md:0 4px 20px rgba(0,0,0,.10);
      --ease:.18s ease;
    }
    body { font-family: var(--font-b); background: var(--bg); color: var(--ink-700); min-height: 100vh; }

    /* NAV */
    .nav {
      height: 56px; background: var(--bg-up); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100; box-shadow: var(--sh-xs);
    }
    .nav-inner {
      max-width: 1100px; margin: 0 auto; padding: 0 24px;
      height: 100%; display: flex; align-items: center; gap: 10px;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--font-d); font-size: 18px; font-weight: 700;
      color: var(--ink-900); text-decoration: none; letter-spacing: -0.02em;
    }
    .nav-logo-icon { width:30px; height:30px; background:var(--accent); border-radius:7px; display:flex; align-items:center; justify-content:center; color:#fff; }
    .nav-logo span { color: var(--accent); }
    .nav-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 15px; border-radius: var(--r-md);
      font-family: var(--font-b); font-size: 13px; font-weight: 600;
      cursor: pointer; border: 1px solid transparent; text-decoration: none; transition: all var(--ease);
    }
    .btn-ghost  { background:transparent; border-color:var(--border); color:var(--ink-700); }
    .btn-ghost:hover  { background:var(--bg); }
    .btn-accent { background:var(--accent); color:#fff; }
    .btn-accent:hover { background:var(--accent-dark); }

    /* PAGE */
    .page { max-width: 1100px; margin: 0 auto; padding: 28px 24px; display: grid; grid-template-columns: 260px 1fr; gap: 22px; align-items: start; }

    /* PROFILE CARD */
    .profile-card {
      background: var(--bg-up); border: 1px solid var(--border);
      border-radius: var(--r-xl); overflow: hidden; box-shadow: var(--sh-sm);
      position: sticky; top: 76px;
    }
    .profile-cover { height: 64px; background: linear-gradient(120deg,#c4611a 0%,#e07b39 55%,#f5b97a 100%); }
    .profile-body  { padding: 0 18px 18px; }
    .av-wrap { margin-top: -26px; margin-bottom: 10px; }
    .av {
      border-radius: 50%; background: var(--accent); color: #fff;
      font-family: var(--font-d); font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; border: 3px solid var(--bg-up); box-shadow: var(--sh-sm);
    }
    .av img { width:100%; height:100%; object-fit:cover; }
    .av-lg { width:52px; height:52px; font-size:19px; }

    .profile-name { font-family:var(--font-d); font-size:16px; font-weight:700; color:var(--ink-900); margin-bottom:2px; }
    .profile-role { font-size:12px; color:var(--ink-400); margin-bottom:12px; }
    .profile-email { font-size:11px; color:var(--accent); font-family:var(--font-m); word-break:break-all; margin-bottom:14px; }

    /* FOLLOW BUTTON */
    .follow-btn {
      width:100%; padding:8px; border-radius:var(--r-md); font-family:var(--font-b);
      font-size:13px; font-weight:600; cursor:pointer; border:1px solid transparent;
      display:flex; align-items:center; justify-content:center; gap:6px; transition:all var(--ease);
    }
    .follow-btn.follow   { background:var(--accent); color:#fff; border-color:var(--accent); }
    .follow-btn.follow:hover { background:var(--accent-dark); }
    .follow-btn.unfollow { background:var(--bg-up); color:var(--ink-600); border-color:var(--border); }
    .follow-btn.unfollow:hover { background:#fef2f0; color:#c0392b; border-color:#fcd5d0; }
    .follow-btn:disabled { opacity:.5; cursor:not-allowed; }

    .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-top:12px; }
    .stat-tile { background:var(--bg); border-radius:var(--r-md); padding:9px 10px; text-align:center; }
    .stat-val  { font-family:var(--font-d); font-size:18px; font-weight:700; color:var(--ink-900); display:block; line-height:1; margin-bottom:2px; }
    .stat-lbl  { font-size:10px; color:var(--ink-400); font-weight:600; letter-spacing:.04em; text-transform:uppercase; }

    /* CIRCUITS */
    .main-col { display:flex; flex-direction:column; gap:16px; }

    .circuits-panel { background:var(--bg-up); border:1px solid var(--border); border-radius:var(--r-xl); overflow:hidden; box-shadow:var(--sh-sm); }
    .panel-head {
      padding:13px 20px; border-bottom:1px solid var(--border-s);
      display:flex; align-items:center; justify-content:space-between;
    }
    .panel-title { font-size:12px; font-weight:700; color:var(--ink-500); letter-spacing:.07em; text-transform:uppercase; display:flex; align-items:center; gap:8px; }
    .count-chip { font-size:11px; padding:2px 8px; border-radius:99px; background:var(--bg); color:var(--ink-400); font-family:var(--font-m); border:1px solid var(--border); }

    .circuits-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:0; }

    .circuit-card {
      padding:16px 20px; border-bottom:1px solid var(--border-s); border-right:1px solid var(--border-s);
      transition:background var(--ease); text-decoration:none; display:block;
    }
    .circuit-card:nth-child(2n) { border-right:none; }
    .circuit-card:nth-last-child(-n+2) { border-bottom:none; }
    .circuit-card:nth-last-child(1):nth-child(odd) { border-bottom:none; }
    .circuit-card:hover { background:#fdf9f6; }

    .circuit-card-name {
      font-size:13.5px; font-weight:600; color:var(--accent);
      margin-bottom:6px; display:block;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .circuit-card-meta { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .meta-stat { display:flex; align-items:center; gap:4px; font-size:12px; color:var(--ink-400); font-weight:500; }
    .meta-stat svg { color:var(--ink-300); }
    .meta-time { font-size:11px; color:var(--ink-400); }

    /* EMPTY */
    .empty-panel { padding:48px 24px; text-align:center; }
    .empty-panel p { font-size:13px; color:var(--ink-400); }

    /* SHIMMER */
    .shimmer { background:linear-gradient(90deg,#ede8e1 25%,#e4dfd7 50%,#ede8e1 75%); background-size:200% 100%; animation:shim 1.4s infinite; border-radius:6px; }
    @keyframes shim { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .skel { padding:16px 20px; border-bottom:1px solid var(--border-s); display:flex; flex-direction:column; gap:8px; }

    .toast {
      position:fixed; bottom:22px; right:22px; padding:10px 18px;
      border-radius:var(--r-md); font-size:13px; font-weight:600; font-family:var(--font-b);
      opacity:0; transform:translateY(6px); transition:all .22s;
      z-index:9999; pointer-events:none; box-shadow:var(--sh-md);
    }
    .toast.show { opacity:1; transform:translateY(0); }
    .toast.ok  { background:#14532d; color:#fff; }
    .toast.err { background:#7f1d1d; color:#fff; }

    @media (max-width:820px) { .page { grid-template-columns:1fr; } .profile-card { position:static; } .circuits-grid { grid-template-columns:1fr; } .circuit-card { border-right:none; } }
    @media (max-width:480px) { .page { padding:12px; } }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a class="nav-logo" href="/">
      <div class="nav-logo-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <rect x="4" y="8" width="4" height="8" rx="1"/><rect x="16" y="8" width="4" height="8" rx="1"/>
          <path d="M8 12h8M2 12h2M20 12h2"/>
        </svg>
      </div>
      Sarkit<span>Lab</span>
    </a>
    <div class="nav-right">
      <a class="btn btn-ghost" href="/create-circuit">New Circuit</a>
      <a class="btn btn-accent" href="/login" id="navLoginBtn" style="display:none">Sign In</a>
      <a class="btn btn-ghost" href="/user-dashboard" id="navDashBtn" style="display:none">Dashboard</a>
    </div>
  </div>
</nav>

<div class="page" id="mainPage">
  <aside>
    <div class="profile-card">
      <div class="profile-cover"></div>
      <div class="profile-body">
        <div class="av-wrap">
          <div class="av av-lg" id="profileAv"></div>
        </div>
        <div class="profile-name"  id="profileName">—</div>
        <div class="profile-role"  id="profileRole"></div>
        <div class="profile-email" id="profileEmail"></div>

        <button class="follow-btn follow" id="followBtn" style="display:none">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
          Follow
        </button>

        <div class="stat-grid">
          <div class="stat-tile">
            <span class="stat-val" id="statFollowers">—</span>
            <div class="stat-lbl">Followers</div>
          </div>
          <div class="stat-tile">
            <span class="stat-val" id="statFollowing">—</span>
            <div class="stat-lbl">Following</div>
          </div>
          <div class="stat-tile">
            <span class="stat-val" id="statCircuits">—</span>
            <div class="stat-lbl">Circuits</div>
          </div>
          <div class="stat-tile">
            <span class="stat-val" id="statLikes">—</span>
            <div class="stat-lbl">Total Likes</div>
          </div>
        </div>
      </div>
    </div>
  </aside>

  <main class="main-col">
    <div class="circuits-panel">
      <div class="panel-head">
        <div class="panel-title">
          Public Circuits
          <span class="count-chip" id="projCount">0</span>
        </div>
      </div>
      <div id="circuitsList">
        <div class="skel"><div class="shimmer" style="height:13px;width:55%"></div><div class="shimmer" style="height:11px;width:32%"></div></div>
        <div class="skel"><div class="shimmer" style="height:13px;width:68%"></div><div class="shimmer" style="height:11px;width:28%"></div></div>
        <div class="skel"><div class="shimmer" style="height:13px;width:42%"></div><div class="shimmer" style="height:11px;width:38%"></div></div>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { getSession }                            from "/src/utils/auth.js";
  import { app }                                   from "/src/utils/auth.js";
  import { toggleFollow, isFollowing, listenFollowerCount } from "/src/utils/follows.js";
  import {
    getFirestore, doc, getDoc, collection, query,
    where, getDocs, onSnapshot,
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const db      = getFirestore(app);
  const session = getSession();
  const params  = new URLSearchParams(window.location.search);
  const uid     = params.get("uid");

  let unsubFollower = null;

  if (!session) { document.getElementById("navLoginBtn").style.display = "inline-flex"; }
  else          { document.getElementById("navDashBtn").style.display  = "inline-flex"; }

  function toast(msg, type = "ok") {
    const el = document.getElementById("toast");
    el.textContent = msg; el.className = "toast " + type + " show";
    clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove("show"), 2600);
  }

  function initials(name) {
    if (!name?.trim()) return "?";
    return name.trim().split(/\s+/).map(w => w[0]).join("").toUpperCase().slice(0,2);
  }

  function makeAv(el, name, photo) {
    el.innerHTML = "";
    if (photo) {
      const img = document.createElement("img"); img.src = photo;
      img.onerror = () => { el.innerHTML = ""; el.textContent = initials(name); };
      el.appendChild(img);
    } else { el.textContent = initials(name); }
  }

  function timeAgo(ts) {
    if (!ts) return "";
    const ms   = typeof ts === "number" ? ts : (ts.toMillis?.() ?? new Date(ts).getTime());
    const diff = Date.now() - ms;
    const mins = Math.floor(diff / 60000);
    if (mins < 60)  return mins + "m ago";
    const hrs = Math.floor(mins / 60);
    if (hrs  < 24)  return hrs  + "h ago";
    const days = Math.floor(hrs / 24);
    if (days < 30)  return days + "d ago";
    return new Date(ms).toLocaleDateString("en-IN", { day:"numeric", month:"short", year:"numeric" });
  }

  function slugify(name) {
    return (name || "untitled").toLowerCase().trim()
      .replace(/[^a-z0-9\s-]/g,"").replace(/\s+/g,"-").replace(/-+/g,"-").slice(0,60);
  }

  function updateFollowBtn(following) {
    const btn = document.getElementById("followBtn");
    if (following) {
      btn.className = "follow-btn unfollow";
      btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="17 11 19 13 23 9"/></svg> Following`;
    } else {
      btn.className = "follow-btn follow";
      btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg> Follow`;
    }
  }

  async function loadProfile() {
    if (!uid) return;
    try {
      const snap = await getDoc(doc(db, "users", uid));
      const d    = snap.exists() ? snap.data() : {};
      const name = d.displayName || "User";
      makeAv(document.getElementById("profileAv"), name, d.photoURL || null);
      document.getElementById("profileName").textContent  = name;
      document.getElementById("profileRole").textContent  = d.role || "";
      document.getElementById("profileEmail").textContent = d.email || "";
      document.getElementById("statFollowing").textContent = d.following || 0;
      document.title = `${name} — SarkitLab`;

      unsubFollower = listenFollowerCount(uid, count => {
        document.getElementById("statFollowers").textContent = count;
      });

      const isOwnProfile = session?.uid === uid;
      if (session && !isOwnProfile) {
        const btn = document.getElementById("followBtn");
        btn.style.display = "flex";
        let following = await isFollowing(uid);
        updateFollowBtn(following);
        btn.addEventListener("click", async () => {
          btn.disabled = true;
          const result = await toggleFollow(uid);
          if (result.error) { toast("Follow nahi ho paya", "err"); }
          else { following = !following; updateFollowBtn(following); toast(following ? "Following!" : "Unfollowed"); }
          btn.disabled = false;
        });
      }
    } catch (err) { console.error("[Profile] loadProfile:", err); }
  }

  async function loadCircuits() {
    if (!uid) return;
    const listEl = document.getElementById("circuitsList");
    try {
      const snap     = await getDocs(query(collection(db, "projects"), where("authorUid","==",uid), where("isPublic","==",true)));
      const projects = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      projects.sort((a,b) => {
        const ta = typeof a.updatedAt === "number" ? a.updatedAt : (a.updatedAt?.toMillis?.() ?? a.timestamp ?? 0);
        const tb = typeof b.updatedAt === "number" ? b.updatedAt : (b.updatedAt?.toMillis?.() ?? b.timestamp ?? 0);
        return tb - ta;
      });

      document.getElementById("projCount").textContent    = projects.length;
      document.getElementById("statCircuits").textContent = projects.length;

      if (!projects.length) {
        listEl.innerHTML = `<div class="empty-panel"><p>Koi public circuit nahi hai abhi.</p></div>`;
        return;
      }

      const ids   = projects.map(p => p.id);
      const stats = {};
      for (let i = 0; i < ids.length; i += 30) {
        try {
          const chunk = ids.slice(i, i+30);
          const sq    = await getDocs(query(collection(db, "projectStats"), where("__name__","in",chunk)));
          sq.forEach(d => { stats[d.id] = d.data(); });
        } catch {}
      }

      let totalLikes = 0;
      listEl.innerHTML = "";
      const grid = document.createElement("div");
      grid.className = "circuits-grid";

      projects.forEach(proj => {
        const sl  = proj.slug || slugify(proj.name || "");
        const url = `/circuit-view?project=${proj.id}&name=${encodeURIComponent(sl)}`;
        const st  = stats[proj.id] || {};
        const lk  = st.likes || 0;
        const vw  = st.views || 0;
        totalLikes += lk;
        const ts  = proj.updatedAt || proj.timestamp;

        const card = document.createElement("a");
        card.href  = url;
        card.className = "circuit-card";
        card.innerHTML = `
          <span class="circuit-card-name">${proj.name || "Untitled"}</span>
          <div class="circuit-card-meta">
            <div class="meta-stat">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
              ${lk}
            </div>
            <div class="meta-stat">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              ${vw}
            </div>
            <span class="meta-time">${timeAgo(ts)}</span>
          </div>`;
        grid.appendChild(card);
      });

      listEl.appendChild(grid);
      document.getElementById("statLikes").textContent = totalLikes;

    } catch (err) {
      console.error("[Profile] loadCircuits:", err);
      listEl.innerHTML = `<div class="empty-panel"><p style="color:#c0392b;">Load nahi hua. Reload karo.</p></div>`;
    }
  }

  loadProfile();
  loadCircuits();

  window.addEventListener("beforeunload", () => unsubFollower?.());
</script>
</body>
</html>
