<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — Sarkitshala</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@0,300;0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; }
    .auth-page { flex: 1; display: grid; grid-template-columns: 1fr 1fr; min-height: 100vh; }
    .auth-left { background: var(--ink-900); padding: 48px; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; }
    .auth-left::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle 500px at 0% 0%, rgba(196,97,26,.2) 0%, transparent 60%), radial-gradient(circle 400px at 100% 100%, rgba(45,125,79,.15) 0%, transparent 60%); pointer-events: none; }
    .auth-left-content { position: relative; z-index: 1; }
    .auth-logo { display: flex; align-items: center; gap: 10px; font-family: var(--font-display); font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 60px; text-decoration: none; }
    .auth-logo-icon { width: 40px; height: 40px; background: var(--accent); border-radius: var(--r-sm); display: flex; align-items: center; justify-content: center; }
    .auth-left h2 { font-family: var(--font-display); font-size: 38px; font-weight: 700; color: #fff; line-height: 1.15; margin-bottom: 20px; letter-spacing: -.3px; }
    .auth-left h2 em { color: var(--accent-muted); font-style: italic; }
    .auth-left p { font-size: 15px; color: #9c968f; line-height: 1.7; max-width: 360px; }
    .auth-left-footer { position: relative; z-index: 1; font-size: 12px; color: #5c5650; }
    .auth-right { background: var(--bg-base); display: flex; align-items: center; justify-content: center; padding: 48px 40px; }
    .auth-form-wrap { width: 100%; max-width: 400px; }
    .auth-form-header { margin-bottom: 32px; }
    .auth-form-header h1 { font-family: var(--font-display); font-size: 28px; font-weight: 700; color: var(--ink-900); margin-bottom: 6px; }
    .auth-form-header p { font-size: 14px; color: var(--ink-500); }
    .auth-form-header a { color: var(--accent); font-weight: 600; }
    .google-btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px 20px; background: var(--bg-elevated); border: 1.5px solid var(--border); border-radius: var(--r-sm); font-size: 14px; font-weight: 600; color: var(--ink-700); cursor: pointer; transition: all var(--ease); font-family: var(--font-ui); margin-bottom: 20px; }
    .google-btn:hover { background: var(--cream-200); border-color: var(--border-strong); }
    .google-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .or-divider { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; color: var(--ink-300); font-size: 12px; }
    .or-divider::before, .or-divider::after { content: ''; flex: 1; height: 1px; background: var(--border-soft); }
    .form-group { margin-bottom: 18px; }
    .password-wrap { position: relative; }
    .password-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--ink-400); padding: 4px; display: flex; }
    .forgot-row { display: flex; justify-content: flex-end; margin-top: 6px; }
    .forgot-link { font-size: 12.5px; color: var(--accent); font-weight: 600; cursor: pointer; }
    .forgot-link:hover { text-decoration: underline; }
    .form-msg { border-radius: var(--r-sm); padding: 10px 14px; font-size: 13px; margin-bottom: 18px; display: none; align-items: flex-start; gap: 8px; }
    .form-msg.show { display: flex; }
    .form-msg.error { background: var(--red-bg); border: 1px solid var(--red-border); color: var(--red); }
    .form-msg.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
    @media (max-width: 900px) {
      .auth-page { grid-template-columns: 1fr; }
      .auth-left { display: none; }
      .auth-right { padding: 32px 24px; }
    }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-left">
    <div class="auth-left-content">
      <a class="auth-logo" href="/">
        <div class="auth-logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"><rect x="4" y="8" width="4" height="8" rx="1"/><rect x="16" y="8" width="4" height="8" rx="1"/><path d="M8 12h8M2 12h2M20 12h2"/></svg>
        </div>
        Sarkitshala
      </a>
      <h2>Welcome <em>back</em> to your circuits</h2>
      <p>Log in to access your saved projects, continue building, and share your work with the community.</p>
    </div>
    <div class="auth-left-footer">© 2024 Sarkitshala</div>
  </div>

  <div class="auth-right">
    <div class="auth-form-wrap">
      <div class="auth-form-header">
        <h1>Log in</h1>
        <p>Don't have an account? <a href="/register">Sign up free</a></p>
      </div>

      <button class="google-btn" id="googleBtn" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
      </button>

      <div class="or-divider">or log in with email</div>

      <div class="form-msg" id="globalMsg">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
        <span id="globalMsgText"></span>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="field-label" for="email">Email Address</label>
          <input class="input-field" type="email" id="email" placeholder="rahul@example.com" autocomplete="email" required />
          <div class="field-error" id="emailErr" style="display:none"></div>
        </div>

        <div class="form-group">
          <label class="field-label" for="password">Password</label>
          <div class="password-wrap">
            <input class="input-field" type="password" id="password" placeholder="Your password" autocomplete="current-password" required />
            <button type="button" class="password-toggle" id="togglePass">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" id="eyeIcon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="forgot-row">
            <span class="forgot-link" id="forgotLink">Forgot password?</span>
          </div>
          <div class="field-error" id="passwordErr" style="display:none"></div>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;padding:13px;margin-top:4px;" id="submitBtn">
          Log In
        </button>
      </form>
    </div>
  </div>
</div>

<script type="module">
  import { loginUser, loginWithGoogle, resetPassword, getSession } from "/src/utils/auth.js";

  if (getSession()) {
    window.location.replace("/user-dashboard");
  }

  document.getElementById("togglePass").addEventListener("click", () => {
    const inp  = document.getElementById("password");
    const t    = inp.type === "password" ? "text" : "password";
    inp.type   = t;
    const icon = document.getElementById("eyeIcon");
    icon.innerHTML = t === "text"
      ? `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  });

  document.getElementById("forgotLink").addEventListener("click", async () => {
    const email = document.getElementById("email").value.trim();
    if (!email) { _showMsg("Please enter your email first.", "error"); return; }
    try {
      await resetPassword(email);
      _showMsg("Password reset email sent! Check your inbox.", "success");
    } catch {
      _showMsg("Could not send reset email. Please try again.", "error");
    }
  });

  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    _clearFieldErr("emailErr");
    _clearFieldErr("passwordErr");
    document.getElementById("globalMsg").classList.remove("show");

    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    let valid = true;
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { _fieldErr("emailErr", "Enter a valid email address"); valid = false; }
    if (!password) { _fieldErr("passwordErr", "Password is required"); valid = false; }
    if (!valid) return;

    const btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.innerHTML = `<div class="loading-spinner" style="width:16px;height:16px;border-width:2px;border-color:rgba(255,255,255,.3);border-top-color:#fff;"></div> Logging in…`;

    try {
      await loginUser({ email, password });
      window.location.replace("/user-dashboard");
    } catch (err) {
      btn.disabled    = false;
      btn.textContent = "Log In";
      let msg = "Login failed. Please try again.";
      if (err.code === "auth/user-not-found" || err.code === "auth/invalid-credential") msg = "Incorrect email or password.";
      if (err.code === "auth/wrong-password")    msg = "Incorrect password.";
      if (err.code === "auth/too-many-requests") msg = "Too many attempts. Try again later.";
      if (err.code === "auth/user-disabled")     msg = "This account has been disabled.";
      _showMsg(msg, "error");
    }
  });

  document.getElementById("googleBtn").addEventListener("click", async () => {
    const btn = document.getElementById("googleBtn");
    btn.disabled = true;
    btn.innerHTML = `<div class="loading-spinner" style="width:16px;height:16px;border-width:2px;border-color:rgba(0,0,0,.15);border-top-color:#555;"></div> Opening Google…`;
    try {
      await loginWithGoogle();
      window.location.replace("/user-dashboard");
    } catch (err) {
      btn.disabled = false;
      btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Continue with Google`;
      _showMsg("Google sign-in failed. Please try again.", "error");
    }
  });

  function _fieldErr(id, msg) {
    const el = document.getElementById(id);
    el.style.display = "flex";
    el.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg> ${msg}`;
    document.getElementById(id.replace("Err",""))?.classList.add("error");
  }
  function _clearFieldErr(id) {
    const el = document.getElementById(id);
    if (el) { el.style.display = "none"; el.textContent = ""; }
    document.getElementById(id.replace("Err",""))?.classList.remove("error");
  }
  function _showMsg(msg, type) {
    const el = document.getElementById("globalMsg");
    el.className = `form-msg show ${type}`;
    document.getElementById("globalMsgText").textContent = msg;
  }
</script>
</body>
</html>
