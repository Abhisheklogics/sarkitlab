<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Circuit — SarkitLab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent:      #c4611a;
      --accent-dark: #a34f13;
      --accent-lt:   #fff2e8;
      --ink-900: #1a1714; --ink-700: #3d3730; --ink-500: #6b6259; --ink-400: #8c8178; --ink-300: #b5aca3;
      --bg: #f5f2ee; --bg-up: #ffffff; --border: #e8e3dc; --border-s: #ede8e1;
      --font-d: 'Playfair Display', Georgia, serif;
      --font-b: 'Plus Jakarta Sans', system-ui, sans-serif;
      --r-md: 10px; --r-lg: 16px; --r-xl: 22px;
      --sh-sm: 0 2px 8px rgba(0,0,0,.08); --sh-md: 0 4px 20px rgba(0,0,0,.10);
      --ease: .18s ease;
    }
    body { font-family: var(--font-b); background: var(--bg); color: var(--ink-700); min-height: 100vh; }

    .nav {
      height: 56px; background: var(--bg-up); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 3px rgba(0,0,0,.05);
    }
    .nav-inner {
      max-width: 1100px; margin: 0 auto; padding: 0 24px;
      height: 100%; display: flex; align-items: center; gap: 10px;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--font-d); font-size: 18px; font-weight: 700;
      color: var(--ink-900); text-decoration: none; letter-spacing: -0.02em;
    }
    .nav-logo-icon {
      width: 30px; height: 30px; background: var(--accent);
      border-radius: 7px; display: flex; align-items: center; justify-content: center; color: #fff;
    }
    .nav-logo span { color: var(--accent); }
    .nav-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 15px; border-radius: var(--r-md);
      font-family: var(--font-b); font-size: 13px; font-weight: 600;
      cursor: pointer; border: 1px solid transparent; text-decoration: none; transition: all var(--ease);
    }
    .btn-ghost  { background: transparent; border-color: var(--border); color: var(--ink-700); }
    .btn-ghost:hover  { background: var(--bg); }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-accent:hover { background: var(--accent-dark); }

    .page {
      max-width: 1100px; margin: 0 auto; padding: 28px 24px;
      display: grid; grid-template-columns: 1fr 280px; gap: 22px; align-items: start;
    }

    /* LEFT — circuit frame */
    .viewer-card {
      background: var(--bg-up); border: 1px solid var(--border);
      border-radius: var(--r-xl); overflow: hidden; box-shadow: var(--sh-sm);
    }
    .viewer-header {
      padding: 14px 20px; border-bottom: 1px solid var(--border-s);
      display: flex; align-items: center; justify-content: space-between;
    }
    .circuit-title { font-family: var(--font-d); font-size: 16px; font-weight: 700; color: var(--ink-900); }
    .run-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 11px; border-radius: 99px; font-size: 12px; font-weight: 700;
      background: #dcfce7; color: #166534; border: 1px solid #bbf7d0;
    }
    .run-chip.idle { background: var(--bg); color: var(--ink-400); border-color: var(--border); }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #16a34a; animation: pulse 2s infinite; display: inline-block; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.85)} }

    .embed-wrap { position: relative; width: 100%; height: 560px; background: #edeae5; overflow: hidden; }
    .embed-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

    .viewer-footer {
      padding: 12px 20px; border-top: 1px solid var(--border-s);
      display: flex; align-items: center; gap: 14px; background: var(--bg);
    }
    .stat-pill {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 13px; font-weight: 600; color: var(--ink-500);
    }
    .stat-pill svg { color: var(--ink-300); }
    .like-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 99px;
      border: 1px solid var(--border); background: var(--bg-up);
      font-family: var(--font-b); font-size: 13px; font-weight: 600;
      color: var(--ink-700); cursor: pointer; transition: all var(--ease); margin-left: auto;
    }
    .like-btn:hover { border-color: #fca5a5; background: #fef2f2; color: #c0392b; }
    .like-btn.liked { background: #fef2f2; border-color: #fca5a5; color: #c0392b; }
    .like-btn.liked svg { fill: #c0392b; stroke: #c0392b; }

    /* RIGHT — author + info */
    .sidebar { display: flex; flex-direction: column; gap: 16px; }

    .author-card {
      background: var(--bg-up); border: 1px solid var(--border);
      border-radius: var(--r-xl); overflow: hidden; box-shadow: var(--sh-sm);
    }
    .author-cover {
      height: 52px;
      background: linear-gradient(120deg, #c4611a 0%, #e07b39 55%, #f5b97a 100%);
    }
    .author-body { padding: 0 18px 18px; }
    .author-av-wrap { margin-top: -22px; margin-bottom: 10px; }
    .av {
      border-radius: 50%; background: var(--accent); color: #fff;
      font-family: var(--font-d); font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; border: 3px solid var(--bg-up); box-shadow: var(--sh-sm);
    }
    .av img { width: 100%; height: 100%; object-fit: cover; }
    .av-md { width: 44px; height: 44px; font-size: 16px; }

    .author-name {
      font-family: var(--font-d); font-size: 15px; font-weight: 700;
      color: var(--ink-900); margin-bottom: 2px;
    }
    .author-sub { font-size: 12px; color: var(--ink-400); margin-bottom: 12px; }
    .author-link {
      display: block; width: 100%; padding: 8px; border-radius: var(--r-md);
      font-family: var(--font-b); font-size: 13px; font-weight: 600; cursor: pointer;
      border: 1px solid var(--border); background: transparent; color: var(--ink-700);
      text-align: center; text-decoration: none; transition: all var(--ease);
    }
    .author-link:hover { background: var(--bg); }

    .author-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-top: 10px; }
    .a-stat { background: var(--bg); border-radius: var(--r-md); padding: 8px 10px; text-align: center; }
    .a-stat strong { display: block; font-family: var(--font-d); font-size: 17px; font-weight: 700; color: var(--ink-900); line-height: 1; margin-bottom: 2px; }
    .a-stat span { font-size: 10px; color: var(--ink-400); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }

    .info-card {
      background: var(--bg-up); border: 1px solid var(--border);
      border-radius: var(--r-xl); overflow: hidden; box-shadow: var(--sh-sm);
    }
    .info-header {
      padding: 12px 16px; border-bottom: 1px solid var(--border-s);
      font-size: 11px; font-weight: 700; letter-spacing: .07em;
      text-transform: uppercase; color: var(--ink-400);
    }
    .info-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
    .info-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-500); }
    .info-row svg { color: var(--ink-300); flex-shrink: 0; }
    .info-row span { color: var(--ink-700); font-weight: 500; }

    .not-found {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 60vh; gap: 14px; text-align: center;
    }
    .not-found h2 { font-family: var(--font-d); font-size: 22px; color: var(--ink-900); }
    .not-found p { font-size: 14px; color: var(--ink-400); }

    .skeleton { background: linear-gradient(90deg,#ede8e1 25%,#e4dfd7 50%,#ede8e1 75%); background-size: 200% 100%; animation: shim 1.4s infinite; border-radius: 6px; }
    @keyframes shim { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    .toast {
      position: fixed; bottom: 22px; right: 22px;
      padding: 10px 18px; border-radius: var(--r-md);
      font-size: 13px; font-weight: 600; font-family: var(--font-b);
      opacity: 0; transform: translateY(6px); transition: all .22s;
      z-index: 9999; pointer-events: none; box-shadow: var(--sh-md);
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.ok  { background: #14532d; color: #fff; }
    .toast.err { background: #7f1d1d; color: #fff; }

    @media (max-width: 820px) { .page { grid-template-columns: 1fr; } .embed-wrap { height: 420px; } }
    @media (max-width: 480px) { .page { padding: 12px; } .embed-wrap { height: 300px; } }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a class="nav-logo" href="/">
      <div class="nav-logo-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <rect x="4" y="8" width="4" height="8" rx="1"/><rect x="16" y="8" width="4" height="8" rx="1"/>
          <path d="M8 12h8M2 12h2M20 12h2"/>
        </svg>
      </div>
      Sarkit<span>Lab</span>
    </a>
    <div class="nav-right">
      <a class="btn btn-ghost" href="/create-circuit">Try Yourself</a>
      <a class="btn btn-accent" href="/login" id="navLoginBtn" style="display:none">Sign In</a>
    </div>
  </div>
</nav>

<div class="page" id="mainPage" style="display:none">
  <div>
    <div class="viewer-card">
      <div class="viewer-header">
        <div class="circuit-title" id="circuitTitle">Loading…</div>
        <div class="run-chip idle" id="runChip">
          <span style="width:7px;height:7px;border-radius:50%;background:#94a3b8;display:inline-block"></span>
          Loading
        </div>
      </div>
      <div class="embed-wrap">
        <iframe id="circuitFrame" src="" title="Circuit" allowfullscreen></iframe>
      </div>
      <div class="viewer-footer">
        <div class="stat-pill" id="viewsPill">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          —
        </div>
        <div class="stat-pill" id="likesPill">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          —
        </div>
        <button class="like-btn" id="likeBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          Like
        </button>
      </div>
    </div>
  </div>

  <aside class="sidebar">
    <div class="author-card">
      <div class="author-cover"></div>
      <div class="author-body">
        <div class="author-av-wrap">
          <div class="av av-md" id="authorAv"></div>
        </div>
        <div class="author-name" id="authorName">—</div>
        <div class="author-sub" id="authorSub">Creator</div>
        <a class="author-link" id="authorProfileLink" href="#">View Profile & Circuits</a>
        <div class="author-stats">
          <div class="a-stat">
            <strong id="authorFollowers">—</strong>
            <span>Followers</span>
          </div>
          <div class="a-stat">
            <strong id="authorCircuits">—</strong>
            <span>Circuits</span>
          </div>
        </div>
      </div>
    </div>

    <div class="info-card">
      <div class="info-header">Circuit Info</div>
      <div class="info-body">
        <div class="info-row">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          <span id="infoDate">—</span>
        </div>
        <div class="info-row">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <span id="infoViews">— views</span>
        </div>
        <div class="info-row">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <span id="infoLikes">— likes</span>
        </div>
      </div>
    </div>
  </aside>
</div>

<div class="not-found" id="notFoundEl" style="display:none">
  <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#b5aca3" stroke-width="1.4" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
  <h2>Circuit not found</h2>
  <p>This circuit may be private or the link is incorrect.</p>
  <a class="btn btn-accent" href="/" style="margin-top:8px">Go Home</a>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { getSession } from "/src/utils/auth.js";
  import { app }        from "/src/utils/auth.js";
  import {
    getFirestore, doc, getDoc, onSnapshot, setDoc, increment, collection, query, where, getDocs,
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const db        = getFirestore(app);
  const session   = getSession();
  const params    = new URLSearchParams(window.location.search);
  const projectId = params.get("project");

  let unsubStats  = null;
  let likedNow    = false;
  let likesNow    = 0;
  let authorUid   = null;

  if (!session) document.getElementById("navLoginBtn").style.display = "inline-flex";

  function toast(msg, type = "ok") {
    const el = document.getElementById("toast");
    el.textContent = msg; el.className = "toast " + type + " show";
    clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove("show"), 2600);
  }

  function initials(name) {
    if (!name?.trim()) return "?";
    return name.trim().split(/\s+/).map(w => w[0]).join("").toUpperCase().slice(0,2);
  }

  function makeAv(el, name, photo) {
    el.innerHTML = "";
    if (photo) {
      const img = document.createElement("img");
      img.src = photo; img.onerror = () => { el.innerHTML = ""; el.textContent = initials(name); };
      el.appendChild(img);
    } else { el.textContent = initials(name); }
  }

  function fmtDate(ts) {
    if (!ts) return "—";
    const ms = typeof ts === "number" ? ts : (ts.toMillis?.() ?? new Date(ts).getTime());
    return new Date(ms).toLocaleDateString("en-IN", { day:"numeric", month:"short", year:"numeric" });
  }

  function updateLikeUI(liked, count) {
    likedNow = liked; likesNow = count;
    const btn = document.getElementById("likeBtn");
    const pill = document.getElementById("likesPill");
    btn.className = "like-btn" + (liked ? " liked" : "");
    btn.innerHTML = liked
      ? `<svg width="13" height="13" viewBox="0 0 24 24" fill="#c0392b" stroke="#c0392b" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> Liked`
      : `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> Like`;
    if (pill) pill.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> ${count}`;
    document.getElementById("infoLikes").textContent = count + " likes";
  }

  function startLiveStats() {
    if (unsubStats) unsubStats();
    unsubStats = onSnapshot(doc(db, "projectStats", projectId), snap => {
      const d     = snap.exists() ? snap.data() : {};
      const views = d.views || 0;
      const likes = d.likes || 0;
      const liked = session?.uid ? !!(d.likedBy?.[session.uid]) : false;
      const vPill = document.getElementById("viewsPill");
      if (vPill) vPill.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg> ${views}`;
      document.getElementById("infoViews").textContent = views + " views";
      updateLikeUI(liked, likes);
    });
  }

  document.getElementById("likeBtn").addEventListener("click", async () => {
    if (!session?.uid) { toast("Like karne ke liye sign in karein", "err"); return; }
    if (session.uid === authorUid) { toast("Apna circuit like nahi kar sakte", "err"); return; }
    const nowLiked = !likedNow;
    updateLikeUI(nowLiked, likesNow + (nowLiked ? 1 : -1));
    try {
      await setDoc(doc(db, "projectStats", projectId), {
        likes: increment(nowLiked ? 1 : -1),
        [`likedBy.${session.uid}`]: nowLiked,
      }, { merge: true });
    } catch {
      updateLikeUI(!nowLiked, likesNow);
      toast("Like save nahi hua", "err");
    }
  });

  function recordView() {
    const key = `sks_viewed_${session?.uid || "anon"}_${projectId}`;
    if (sessionStorage.getItem(key)) return;
    sessionStorage.setItem(key, "1");
    if (session?.uid && session.uid === authorUid) return;
    setDoc(doc(db, "projectStats", projectId), { views: increment(1) }, { merge: true }).catch(() => {});
  }

  async function loadAuthor(uid) {
    if (!uid) return;
    try {
      const snap = await getDoc(doc(db, "users", uid));
      const d    = snap.exists() ? snap.data() : {};
      const name = d.displayName || "Creator";
      makeAv(document.getElementById("authorAv"), name, d.photoURL || null);
      document.getElementById("authorName").textContent = name;
      document.getElementById("authorSub").textContent  = d.institution || d.role || "Circuit Creator";
      document.getElementById("authorFollowers").textContent = d.followers || 0;

      const profileUrl = `/user-profile?uid=${uid}`;
      document.getElementById("authorProfileLink").href = profileUrl;

      const circSnap = await getDocs(query(collection(db, "projects"), where("authorUid","==",uid), where("isPublic","==",true)));
      document.getElementById("authorCircuits").textContent = circSnap.size;
    } catch (err) {
      console.error("[View] loadAuthor:", err);
    }
  }

  async function init() {
    if (!projectId) { document.getElementById("notFoundEl").style.display = "flex"; return; }

    try {
      const snap = await getDoc(doc(db, "projects", projectId));
      if (!snap.exists() || !snap.data().isPublic) {
        document.getElementById("notFoundEl").style.display = "flex"; return;
      }
      const data = snap.data();
      authorUid  = data.authorUid || null;

      document.getElementById("mainPage").style.display = "grid";
      document.getElementById("circuitTitle").textContent = data.name || "Untitled Circuit";
      document.title = `${data.name || "Circuit"} — SarkitLab`;
      document.getElementById("infoDate").textContent = fmtDate(data.updatedAt || data.timestamp);

      const slug     = data.slug || (data.name || "").toLowerCase().replace(/\s+/g,"-");
      const frameUrl = `/create-circuit?project=${projectId}&name=${encodeURIComponent(slug)}&autorun=1`;
      document.getElementById("circuitFrame").src = frameUrl;

      const chip = document.getElementById("runChip");
      chip.className = "run-chip";
      chip.innerHTML = `<span class="live-dot"></span> Running`;

      startLiveStats();
      await loadAuthor(authorUid);
      setTimeout(recordView, 2000);
    } catch (err) {
      console.error("[View] init:", err);
      document.getElementById("notFoundEl").style.display = "flex";
    }
  }

  init();
  window.addEventListener("beforeunload", () => unsubStats?.());
</script>
</body>
</html>
